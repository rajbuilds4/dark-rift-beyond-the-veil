function drawHUD(){
  let isDark=gs==='darkWorld'||gs==='choice'||gs==='ending';
  let hc=isDark?'#cc44ff':'#44aaff';
  // HP hearts
  for(let i=0;i<P.maxHp;i++){
    let hx=18+i*26,hy=22;ctx.globalAlpha=i<P.hp?1:.2;ctx.fillStyle=i<P.hp?'#ee4444':'#441111';
    ctx.save();ctx.translate(hx,hy);ctx.scale(1.0,1.0);ctx.beginPath();ctx.moveTo(0,4);ctx.bezierCurveTo(-9,-4,-16,-4,-16,6);ctx.bezierCurveTo(-16,16,0,25,0,25);ctx.bezierCurveTo(0,25,16,16,16,6);ctx.bezierCurveTo(16,-4,9,-4,0,4);ctx.fill();
    if(i<P.hp){ctx.fillStyle='#ff8888';ctx.fillRect(-4,5,3,9);ctx.fillRect(-7,3,9,3);}
    ctx.restore();ctx.globalAlpha=1;
  }
  // Energy
  let ey=52,ex=14,ew=170,eh=9;
  ctx.fillStyle='#111';rr(ex,ey,ew,eh,3,'#111',null);
  let eg=ctx.createLinearGradient(ex,ey,ex+ew,ey);eg.addColorStop(0,isDark?'#8833ff':'#3366ff');eg.addColorStop(1,isDark?'#ff44ff':'#44aaff');
  ctx.fillStyle=eg;rr(ex,ey,ew*(P.energy/P.maxEnergy),eh,3,eg,null);ctx.strokeStyle='#333';ctx.strokeRect(ex,ey,ew,eh);
  ctx.fillStyle='#666';ctx.font='9px Courier New';ctx.textAlign='left';ctx.fillText('ENERGY',ex,ey+eh+11);
  if(P.burstCooldown<=0){ctx.fillStyle=hc;ctx.fillText('[C] BURST READY',ex+55,ey+eh+11);}
  // XP
  let lx=14,ly=86,lw=170,lh=7;ctx.fillStyle='#111';ctx.fillRect(lx,ly,lw,lh);ctx.fillStyle='#ffcc00';ctx.fillRect(lx,ly,lw*(P.xp/P.xpNeeded),lh);ctx.strokeStyle='#333';ctx.strokeRect(lx,ly,lw,lh);
  ctx.fillStyle='#ffcc00';ctx.font='bold 10px Courier New';ctx.textAlign='left';ctx.fillText(`LVL ${P.level}`,lx,ly-2);
  // Combo
  if(combo>1){
    let ca=Math.min(1,comboTimer/60);ctx.globalAlpha=ca;ctx.shadowBlur=14;ctx.shadowColor=combo>10?'#ffaa00':combo>5?'#ff6600':'#ff4444';
    let cc=combo>10?'#ffff44':combo>5?'#ffaa44':'#ff6644';ctx.fillStyle=cc;ctx.font=`bold ${14+Math.min(combo,18)}px Courier New`;ctx.textAlign='right';ctx.fillText(`${combo}x COMBO`,W-16,50);
    ctx.font='10px Courier New';ctx.fillStyle='#888';ctx.fillText(`BEST: ${comboMax}x`,W-16,64);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  // Score
  ctx.fillStyle='#fff';ctx.font='bold 12px Courier New';ctx.textAlign='right';ctx.fillText(score.toString().padStart(8,'0'),W-16,24);ctx.fillStyle='#555';ctx.font='9px Courier New';ctx.fillText('SCORE',W-16,34);
  // ── POINTS display (top-right, below score) ──
  if(gs==='darkWorld'||gs==='choice'||gs==='ending'){
    let unlocked=points>=REQUIRED_POINTS;
    let pc=unlocked?'#ffcc00':points>REQUIRED_POINTS*.66?'#ff8800':points>REQUIRED_POINTS*.33?'#ff4400':'#cc2200';
    ctx.shadowBlur=unlocked?10:0;ctx.shadowColor='#ffcc00';
    ctx.fillStyle=pc;ctx.font='bold 11px Courier New';ctx.textAlign='right';
    ctx.fillText(`⚡ ${points}${unlocked?' ✓':''}/${REQUIRED_POINTS}`,W-16,50);
    ctx.fillStyle='#444';ctx.font='9px Courier New';
    ctx.fillText('POWER',W-16,60);
    ctx.shadowBlur=0;
    // mini bar
    let pbw=80,pbh=4,pbx=W-16-pbw,pby=63;
    ctx.fillStyle='#222';ctx.fillRect(pbx,pby,pbw,pbh);
    let ppct=Math.min(1,points/REQUIRED_POINTS);
    let mpg=ctx.createLinearGradient(pbx,pby,pbx+pbw,pby);mpg.addColorStop(0,'#ff2200');mpg.addColorStop(.5,'#ff8800');mpg.addColorStop(1,'#ffcc00');
    ctx.fillStyle=mpg;ctx.fillRect(pbx,pby,pbw*ppct,pbh);
    ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(pbx,pby,pbw,pbh);
  }
  // ─────────────────────────────────────────────
  // Phase
  let pl={normal:'— PEACEFUL WORLD —',darkWorld:'— DARK RIFT —',choiceCinematic:'— THE RIFT STIRS —',choice:'— THE CHOICE —',ending:playerChoice==='return'?'— RETURNING —':'— CONSUMED —',void:'— THE VOID —'}[gs]||'';
  ctx.fillStyle=gs==='void'?'#ff4444':isDark?'#cc44ff':'#6699cc';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.shadowBlur=8;ctx.shadowColor=gs==='void'?'#ff0000':isDark?'#8822ff':'#2244aa';ctx.fillText(pl,W/2,20);ctx.shadowBlur=0;
  // Progress
  if(gs==='darkWorld'||gs==='choice'){
    let pct=Math.min(1,dist/FINAL_DIST),pbx=W/2-145,pby=H-22,pbw=290,pbh=7;
    ctx.fillStyle='#111';ctx.fillRect(pbx,pby,pbw,pbh);
    let pbg=ctx.createLinearGradient(pbx,pby,pbx+pbw,pby);pbg.addColorStop(0,'#4422aa');pbg.addColorStop(.5,pct>.8?'#ff2200':'#8844ff');pbg.addColorStop(1,pct>.8?'#ff8800':'#cc44ff');
    ctx.fillStyle=pbg;ctx.fillRect(pbx,pby,pbw*pct,pbh);ctx.strokeStyle='#443355';ctx.strokeRect(pbx,pby,pbw,pbh);
    ctx.fillStyle='#666';ctx.font='9px Courier New';ctx.textAlign='center';ctx.fillText(`${Math.floor(dist)} / ${FINAL_DIST}`,W/2,pby-3);
    if(!bossActive&&!bossKilled&&dist>=FINAL_DIST*.4&&dist<FINAL_DIST*.47){let ba=.5+Math.sin(frame*.2)*.5;ctx.globalAlpha=ba;ctx.fillStyle='#ff2200';ctx.font='bold 12px Courier New';ctx.textAlign='center';ctx.shadowBlur=12;ctx.shadowColor='#ff0000';ctx.fillText('⚠  BOSS INCOMING  ⚠',W/2,H-38);ctx.shadowBlur=0;ctx.globalAlpha=1;}
    if(pct>.82){let pa=.4+Math.sin(frame*.18)*.4;ctx.globalAlpha=pa;ctx.fillStyle='#ff6600';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText('▶▶ FINAL CHOICE APPROACHING ▶▶',W/2,H-38);ctx.globalAlpha=1;}
  }
  if(dist<400&&gs==='normal'){ctx.globalAlpha=.35;ctx.fillStyle='#8899aa';ctx.font='10px Courier New';ctx.textAlign='center';ctx.fillText('[A/D] Move  [Space/W] Jump  [Z] Slash  [X] Dash  [C] Burst',W/2,H-12);ctx.globalAlpha=1;}
}

function drawVoid(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  for(let i=0;i<6;i++){let vx=(frame*.1+i*160)%W,vy=80+i*60+Math.sin(frame*.02+i)*30;let vg=ctx.createRadialGradient(vx,vy,0,vx,vy,45);vg.addColorStop(0,'rgba(200,0,0,.14)');vg.addColorStop(1,'transparent');ctx.fillStyle=vg;ctx.beginPath();ctx.arc(vx,vy,60,0,6.28);ctx.fill();}
  for(let vp of voidParticles){let a=(vp.life/vp.maxLife)*(.3+Math.sin(vp.pulse)*.22);ctx.globalAlpha=a;let r=Math.floor(150+Math.sin(vp.pulse)*50);ctx.fillStyle=`rgb(${r},0,0)`;ctx.shadowBlur=8;ctx.shadowColor='#880000';ctx.beginPath();ctx.arc(vp.x,vp.y,vp.size,0,6.28);ctx.fill();ctx.shadowBlur=0;}
  ctx.globalAlpha=.035;ctx.strokeStyle='#440000';for(let gx=0;gx<W;gx+=60){let w=Math.sin(frame*.02+gx*.01)*5;ctx.beginPath();ctx.moveTo(gx+w,0);ctx.lineTo(gx-w,H);ctx.stroke();}ctx.globalAlpha=1;
  drawPlayer();
  if(endTextA>0){
    ctx.globalAlpha=endTextA;let pw=540,ph=140,px=(W-pw)/2,py=(H-ph)/2-20;
    ctx.fillStyle='#000000dd';ctx.fillRect(px,py,pw,ph);ctx.shadowBlur=20;ctx.shadowColor='#ff0000';ctx.strokeStyle='#ff2200';ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);ctx.lineWidth=1;
    ctx.fillStyle='#ff4444';ctx.font='bold 26px Courier New';ctx.textAlign='center';ctx.fillText('YOU CHOSE POWER.',W/2,py+42);ctx.shadowBlur=0;
    ctx.fillStyle='#cc2222';ctx.font='14px Courier New';ctx.fillText('THE RIFT CONSUMED EVERYTHING.',W/2,py+72);ctx.fillStyle='#662222';ctx.font='11px Courier New';ctx.fillText('There was no going back.',W/2,py+96);ctx.fillStyle='#331111';ctx.font='10px Courier New';ctx.fillText('[ Press F5 to restart ]',W/2,py+120);ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

function drawReturnEnding(){
  let prog=Math.min(1,endTimer/300);
  let sky=ctx.createLinearGradient(0,0,0,GY);sky.addColorStop(0,`hsl(${210+prog*20},${40+prog*30}%,${8+prog*35}%)`);sky.addColorStop(1,`hsl(${200+prog*20},${30+prog*25}%,${15+prog*20}%)`);ctx.fillStyle=sky;ctx.fillRect(0,0,W,GY);
  ctx.globalAlpha=1-prog*.7;for(let s of stars){let sx=((s.x-camX*.15)%(W+200)+W+200)%(W+200)-100;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,s.y,s.r,0,6.28);ctx.fill();}ctx.globalAlpha=1;
  let gnd=ctx.createLinearGradient(0,GY,0,H);gnd.addColorStop(0,`hsl(${120+prog*10},${15+prog*45}%,${8+prog*18}%)`);gnd.addColorStop(1,'#040808');ctx.fillStyle=gnd;ctx.fillRect(0,GY,W,H-GY);
  ctx.strokeStyle=`hsl(120,${30+prog*40}%,${20+prog*25}%)`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();ctx.lineWidth=1;
  drawPlatforms();
  let rpx=(returnPortalX||P.x+W*.4);drawPortal(rpx+W*.5,GY-75,'#4488ff','#88ccff','EXIT PORTAL');
  drawParticles();drawPlayer();
  ctx.globalAlpha=prog*.25;let rpcx=(rpx+W*.5)-camX;
  for(let r=0;r<8;r++){let ra=r*Math.PI*.25+frame*.01,rlen=180+Math.sin(frame*.03+r)*40;ctx.strokeStyle='#88ccff';ctx.lineWidth=4-r*.3;ctx.beginPath();ctx.moveTo(rpcx,GY-75);ctx.lineTo(rpcx+Math.cos(ra)*rlen,GY-75+Math.sin(ra)*rlen*.3);ctx.stroke();}
  ctx.lineWidth=1;ctx.globalAlpha=1;
  if(endTextA>0){
    ctx.globalAlpha=endTextA;let pw=500,ph=140,px=(W-pw)/2,py=(H-ph)/2-20;
    ctx.fillStyle='#00000088';ctx.fillRect(px,py,pw,ph);ctx.shadowBlur=20;ctx.shadowColor='#4488ff';ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);ctx.lineWidth=1;ctx.shadowBlur=0;
    ctx.fillStyle='#88ccff';ctx.font='bold 26px Courier New';ctx.textAlign='center';ctx.shadowBlur=12;ctx.shadowColor='#4488ff';ctx.fillText('YOU ESCAPED THE DARKNESS',W/2,py+42);ctx.shadowBlur=0;
    ctx.fillStyle='#6699cc';ctx.font='13px Courier New';ctx.fillText('The rift fades. Peace returns.',W/2,py+72);ctx.fillStyle='#446688';ctx.font='11px Courier New';ctx.fillText(`Score: ${score}  |  Best Combo: ${comboMax}x  |  Level: ${P.level}`,W/2,py+96);ctx.fillStyle='#334455';ctx.font='10px Courier New';ctx.fillText('[ Press F5 to restart ]',W/2,py+120);ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

function drawGameOver(){
  ctx.fillStyle='#000000cc';ctx.fillRect(0,0,W,H);ctx.shadowBlur=30;ctx.shadowColor='#ff0000';ctx.fillStyle='#ff4444';ctx.font='bold 42px Courier New';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-30);ctx.shadowBlur=0;
  ctx.fillStyle='#884444';ctx.font='14px Courier New';ctx.fillText('The darkness consumed you.',W/2,H/2+10);ctx.fillStyle='#553333';ctx.font='12px Courier New';ctx.fillText(`Score: ${score}  |  Level: ${P.level}  |  Best Combo: ${comboMax}x`,W/2,H/2+36);ctx.fillStyle='#442222';ctx.font='11px Courier New';ctx.fillText('[ Press F5 to restart ]',W/2,H/2+64);
}

function drawGlitch(){
  drawNormalBg();drawPlatforms();drawPortal(portalX,GY-80,'#8844ff','#cc88ff','ENTER DARK RIFT');drawParticles();drawPlayer();
  let nb=Math.floor((130-glitchT)/8)+3;
  for(let b=0;b<nb;b++){let by=Math.random()*H,bh=4+Math.random()*28,off=(Math.random()-.5)*50;ctx.globalAlpha=.6;ctx.drawImage(C,0,by,W,bh,off,by,W,bh);ctx.globalAlpha=1;}
  let prog=(130-glitchT)/130;ctx.fillStyle=`rgba(75,0,150,${prog*.68})`;ctx.fillRect(0,0,W,H);
  if(glitchT<25){ctx.fillStyle=`rgba(255,255,255,${(25-glitchT)/25})`;ctx.fillRect(0,0,W,H);}
  ctx.fillStyle='#fff';ctx.font=`bold ${20+Math.random()*8}px Courier New`;ctx.textAlign='center';ctx.globalAlpha=Math.random()*.8+.2;ctx.fillText('[ ENTERING THE RIFT ]',W/2,H/2+(Math.random()-.5)*20);ctx.globalAlpha=1;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);frame++;
  ctx.save();ctx.translate(shakeX,shakeY);

  if(gs==='dead'){ctx.fillStyle='#050505';ctx.fillRect(0,0,W,H);drawGameOver();ctx.restore();return;}

  if(gs==='void'){
    updatePlayer();updatePhase();updateParticles();drawVoid();drawHUD();ctx.restore();
    if(flashA>0){ctx.fillStyle=`rgba(${flashR},${flashG},${flashB},${flashA})`;ctx.fillRect(0,0,W,H);}
    return;
  }
  if(gs==='trans'){updatePhase();updateParticles();drawGlitch();drawParticles();ctx.restore();return;}

  // choiceCinematic handles its own player movement inside updatePhase
  if(gs==='choiceCinematic'){
    updatePhase();updateParticles();
    let zoomCx=coreX-camX,zoomCy=GY*.55;
    ctx.save();
    ctx.translate(zoomCx,zoomCy);ctx.scale(cinZoom,cinZoom);ctx.translate(-zoomCx,-zoomCy);
    drawChoiceCinematic();
    ctx.restore();
    ctx.restore();
    if(flashA>0){ctx.fillStyle=`rgba(${flashR},${flashG},${flashB},${flashA})`;ctx.fillRect(0,0,W,H);}
    return;
  }

  updatePlayer();updatePhase();updateParticles();

  if(gs==='normal'){
    drawNormalBg();drawPlatforms();drawPortal(portalX,GY-80,'#8844ff','#cc88ff','ENTER DARK RIFT');drawParticles();drawPlayer();drawFloatTexts();drawHUD();
  } else if(gs==='darkWorld'){
    ctx.globalAlpha=bgAlpha;drawDarkBg();ctx.globalAlpha=1;
    drawPlatforms();drawCollapse();drawObstacles();drawProjectiles();drawEnemies();drawBoss();drawParticles();drawPlayer();drawGate();drawFloatTexts();drawHUD();
  } else if(gs==='choice'){
    drawDarkBg();drawPlatforms();drawParticles();drawChoiceCore();drawPlayer();drawFloatTexts();drawHUD();
  } else if(gs==='ending'){
    if(playerChoice==='power'){
      ctx.globalAlpha=bgAlpha;drawDarkBg();ctx.globalAlpha=1;drawPlatforms();drawCollapse();drawParticles();drawPlayer();drawFloatTexts();drawHUD();
    } else {drawReturnEnding();drawHUD();}
  }

  ctx.restore();
  if(flashA>0){ctx.fillStyle=`rgba(${flashR},${flashG},${flashB},${flashA})`;ctx.fillRect(0,0,W,H);}
}
